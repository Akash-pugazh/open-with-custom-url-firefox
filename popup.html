<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open With Custom URL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #1a1a1f;
    --border: #2e2e38;
    --accent: #7c6af7;
    --accent-glow: rgba(124, 106, 247, 0.25);
    --text: #e8e8f0;
    --muted: #7070a0;
    --success: #4ade80;
    --danger: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 320px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 0;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #1a1030 0%, #0e0e18 100%);
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), #b96af7);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .header-text h1 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }

  .header-text p {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  .body {
    padding: 16px 18px;
  }

  label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .input-wrap {
    position: relative;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .preview {
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .preview-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .preview-url {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.5;
  }

  .preview-url .base { color: var(--accent); }
  .preview-url .link { color: #a0f0c0; }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  button {
    flex: 1;
    padding: 9px 0;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-save {
    background: linear-gradient(135deg, var(--accent), #9b6af7);
    color: #fff;
    box-shadow: 0 2px 10px var(--accent-glow);
  }

  .btn-save:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  .btn-save:active { transform: translateY(0); }

  .btn-reset {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-reset:hover { color: var(--text); border-color: var(--muted); }

  .toast {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--success);
    color: #0e0e10;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  .hint {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.5;
  }

  .hint code {
    font-family: 'Space Mono', monospace;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 4px;
    font-size: 9px;
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">⚡</div>
  <div class="header-text">
    <h1>Custom URL Opener</h1>
    <p>Right-click any link to redirect</p>
  </div>
</div>

<div class="body">
  <label for="baseUrl">Base URL prefix</label>
  <div class="input-wrap">
    <input type="text" id="baseUrl" placeholder="https://test.com/" spellcheck="false" />
  </div>

  <div class="preview">
    <div class="preview-label">Preview</div>
    <div class="preview-url">
      <span class="base" id="previewBase">https://test.com/</span><span class="link">https://google.com</span>
    </div>
  </div>

  <hr class="divider" />

  <p class="hint">
    Right-click any link → <code>Open with: …</code><br/>
    The link URL is appended directly to your base prefix.
  </p>

  <div class="btn-row">
    <button class="btn-reset" id="resetBtn">Reset</button>
    <button class="btn-save" id="saveBtn">Save</button>
  </div>
</div>

<div class="toast" id="toast">✓ Saved!</div>

<script src="popup.js"></script>
</body>
</html>
